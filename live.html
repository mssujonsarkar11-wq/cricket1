<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Live Match</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="video-box">

<video id="camera" autoplay muted></video>

<div class="scorebar">

<div class="teams">

<span id="teamA">TEAM A</span> <span class="vs">v</span> <span id="teamB">TEAM B</span>

<span class="score" id="score">0-0</span> <span class="overs" id="overs">(0.0)</span>

</div>

<div class="batters">

<div class="batter striker">
<span class="arrow">▶</span>
<span id="bat1">Batter1 0(0)</span>
</div>

<div class="batter">
<span id="bat2">Batter2 0(0)</span>
</div>

</div>

<div class="bowler">

<div id="bowler">Bowler</div>

<div class="overballs" id="balls"></div>

</div>

</div>

</div>

<div id="anim"></div>

<script type="module" src="js/ui.js"></script>

</body>
</html>

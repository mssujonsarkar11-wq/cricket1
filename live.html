<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Live Match</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="video-box">

<video id="camera" autoplay muted></video>

<div class="scorebar">

<div class="teams">

<span id="teamA">TEAM A</span>

<span class="vs">v</span>

<span id="teamB">TEAM B</span>

<span class="score" id="score">120-3</span>

<span class="overs" id="overs">(12.4)</span>

</div>

<div class="batters">

<div class="batter striker">

<span class="arrow">▶</span>

<span id="bat1">Rahim 32 (21)</span>

</div>

<div class="batter">

<span id="bat2">Tamim 15 (10)</span>

</div>

</div>

<div class="bowler">

<span id="bowler">Shakib 2-15</span>

<div class="overballs" id="balls">

<span>1</span> <span>4</span> <span>0</span> <span>1</span>

</div>

</div>

</div>

</div>

<script type="module" src="js/ui.js"></script>

</body>
</html>

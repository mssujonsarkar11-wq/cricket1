<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Live Match</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<div id="customContainer"></div>

<div class="video-box" id="scoreArea">

<video id="camera" autoplay muted></video>

<div class="scorebar">

<div class="teams">

<span id="teamA">TEAM A</span> <span>vs</span> <span id="teamB">TEAM B</span>

<span id="score">0-0</span> <span id="overs">(0.0)</span>

</div>

<div class="batters">

<span id="bat1"></span> <span id="bat2"></span>

</div>

<div class="bowler">

<span id="bowler"></span>

<div id="balls"></div>

</div>

</div>

</div>

<div id="rr"></div>
<div id="req"></div>

<div id="anim"></div>

<script type="module" src="js/ui.js"></script>

</body>
</html>

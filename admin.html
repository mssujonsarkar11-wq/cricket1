<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Admin Panel</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>Admin Scoring Panel</h2>

<div class="buttons">

<button onclick="run(1)">+1</button> <button onclick="run(2)">+2</button> <button onclick="run(3)">+3</button> <button onclick="run(4)">FOUR</button> <button onclick="run(6)">SIX</button>

<button onclick="dot()">DOT</button> <button onclick="wicket()">WICKET</button>

<button onclick="wide()">Wide</button> <button onclick="wideRun()">Wide+Run</button>

<button onclick="noball()">No Ball</button>

<button onclick="runOut()">Run Out</button>

</div>

<h3>Teams</h3>

<input id="teamAname" placeholder="Team A">
<input id="teamBname" placeholder="Team B">

<button onclick="setTeams()">Update Teams</button>

<h3>Batsmen</h3>

<input id="bat1name" placeholder="Batter 1">
<input id="bat2name" placeholder="Batter 2">

<button onclick="setBatters()">Set Batters</button>

<h3>Bowler</h3>

<input id="bowlerName" placeholder="Bowler Name">

<button onclick="changeBowler()">Change Bowler</button>

<script type="module" src="js/scoreEngine.js"></script>

</body>
</html>
